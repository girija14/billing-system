{% extends "base.html" %}

{% block title %}{{ "Edit" if product else "Add" }} Product{% endblock %}

{% block content %}
<h1>{{ "Edit" if product else "Add New" }} Product</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post"
      action="{{ '/products/edit/' ~ product.id if product else '/products/add' }}">
    <div class="form-group">
        <label for="product_id">Product ID:</label>
        <input type="text" id="product_id" name="product_id"
               value="{{ product.product_id if product else '' }}" required>
    </div>
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"
               value="{{ product.name if product else '' }}" required>
    </div>
    <div class="form-group">
        <label for="price">Price (per unit):</label>
        <input type="number" step="0.01" min="0" id="price" name="price"
               value="{{ product.price if product else '' }}" required>
    </div>
    <div class="form-group">
        <label for="tax_percentage">Tax Percentage (%):</label>
        <input type="number" step="0.01" min="0" id="tax_percentage" name="tax_percentage"
               value="{{ product.tax_percentage if product else '' }}" required>
    </div>
    <div class="form-group">
        <label for="available_stocks">Available Stocks:</label>
        <input type="number" min="0" id="available_stocks" name="available_stocks"
               value="{{ product.available_stocks if product else '' }}" required>
    </div>
    <div class="actions">
        <a href="/products/" class="btn btn-cancel">Cancel</a>
        <button type="submit" class="btn">{{ "Update" if product else "Add" }} Product</button>
    </div>
</form>
{% endblock %}
